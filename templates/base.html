<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Smart Traffic Detection" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">🚦 Smart Traffic Detection</div>
    {% if session.get('user_type') %}
    <div class="menu">
        {% if session.get('user_type') == 'admin' %}
            <a href="{{ url_for('admin_dashboard') }}" class="btn-outline">Dashboard</a>
            <a href="{{ url_for('video_feed') }}" class="btn-outline">Live Feed</a>
            <a href="{{ url_for('violations') }}" class="btn-outline">Violations</a>
            <a href="{{ url_for('vehicles') }}" class="btn-outline">Vehicles</a>
        {% else %}
            <a href="{{ url_for('public_dashboard') }}" class="btn-outline">Dashboard</a>
            <a href="{{ url_for('violations') }}" class="btn-outline">Violations</a>
            <a href="{{ url_for('vehicles') }}" class="btn-outline">Vehicles</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="btn-red">Logout</a>
    </div>
    {% endif %}
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
